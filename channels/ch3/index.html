<!-- Channel 3: Music/Audio Works -->
<div id="music-interface" role="region" aria-label="Music Channel Interface">
  
  <!-- Main Video Display -->
  <div class="music-player-container">
    <div class="video-display">
      <div id="music-video-player"></div>
    </div>

    <!-- TV-Style Controls -->
    <div class="tv-controls">
      <button class="control-btn" id="prevTrack" aria-label="Previous Track">⏮</button>
      <div class="now-playing">
        <div class="channel-number">CH3</div>
        <div class="now-playing-title" id="nowPlayingTitle">Select a track</div>
      </div>
      <button class="control-btn" id="playPause" aria-label="Play/Pause">▶</button>
      <button class="control-btn" id="nextTrack" aria-label="Next Track">⏭</button>
    </div>
  </div>

</div>
